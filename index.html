<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Das's Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, lab(87.91% 23.2 -11.61), hwb(315 41% 2%));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.067);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 40px 30px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        .art-text {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, lab(77.78% -27.3 -20.4), hsl(6, 84%, 55%));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }

        #buttonstart {
            display: block;
            margin: 20px auto 0;
            padding: 14px 32px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(95deg, lch(55.46% 84.68 38.01), hwb(320 49% 6%));
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
        }

        .options-panel {
            display: none;
            flex-direction: column;
            gap: 28px;
        }

        .option-group {
            background: rgba(16, 3, 10, 0.536);
            border-radius: 32px;
            padding: 18px 22px;
            border-left: 5px solid lab(62.92% 55.47 -51.06 / 0.706);
        }

        .group-title {
            font-size: 20px;
            font-weight: bold;
            color: hwb(249 41% 5%);
            margin-bottom: 15px;
        }

        .speed-area {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        input[type="range"] {
            flex: 2;
            height: 5px;
            border-radius: 10px;
        }

        .speed-value {
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .music-option {
            background: #252539;
            border: 1px solid #5a5a8a;
            padding: 8px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
        }

        .music-option.selected {
            background: hwb(167 14% 0%);
            color: #1e1e2a;
            border-color: #f5af19;
        }

        #completeBtn {
            background: hsl(332, 100%, 70%);
            border: none;
            padding: 14px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        .performance-area {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            text-align: center;
        }

        .drummer-gif {
            width: 200px;
            height: 200px;
            background: lch(0.58% 2.77 19.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            animation: bob 0.6s infinite alternate;
        }

        @keyframes bob {
            0% { transform: translateY(0px); }
            100% { transform: translateY(10px); }
        }

        .playing-text {
            color: white;
            background: #00000066;
            padding: 8px 18px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="art-text" id="artTitle">The Das's Studio</div>
    <button id="buttonstart">🎧 start playing 🎧</button>

    <div id="optionsPanel" class="options-panel">
        <div class="option-group">
            <div class="group-title">⚡BPM</div>
            <div class="speed-area">
                <input type="range" id="bpmSlider" min="60" max="180" value="110" step="1">
                <span class="speed-value" id="bpmValue">110 BPM</span>
            </div>
        </div>

        <div class="option-group">
            <div class="group-title">🥁 Bass drum (Choose one out of three options)</div>
            <div class="btn-group" id="kickGroup">
                <button data-kick="kick1" class="music-option">🎵 Bass drum · 1</button>
                <button data-kick="kick2" class="music-option">🎵 Bass drum · 2</button>
                <button data-kick="kick3" class="music-option">🎵 Bass drum · 3</button>
            </div>
        </div>

        <div class="option-group">
            <div class="group-title">🎸 guitar and 🎹 piano melody (Choose one out of four options)</div>
            <div class="btn-group" id="melodyGroup">
                <button data-melody="guitar1" class="music-option">🎸 guitar · 1</button>
                <button data-melody="guitar2" class="music-option">🎸 guitar · 2</button>
                <button data-melody="piano1" class="music-option">🎹 piano · 1</button>
                <button data-melody="piano2" class="music-option">🎹 piano · 2</button>
            </div>
        </div>

        <button id="completeBtn">✨ Finished ✨</button>
    </div>

    <div id="performanceArea" class="performance-area">
        <div class="drummer-gif">🥁🎶</div>
        <div class="playing-text" id="playingMsg">🎵 Your band is performing 🎵</div>
    </div>
</div>

<script>
    //用户数据记录
    let selectedKick = null;
    let selectedmelody = null;
    let currentBPM = 110;

    const artTextDiv = document.querySelector('.art-text');
    const startBtn = document.getElementById('buttonstart');
    const optionsPanel = document.getElementById('optionsPanel');
    const performanceArea = document.getElementById('performanceArea');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmValueSpan = document.getElementById('bpmValue');
    const completeBtn = document.getElementById('completeBtn');

    const kickBtns = document.querySelectorAll('#kickGroup .music-option');
    const melodyBtns = document.querySelectorAll('#melodyGroup .music-option');

    //全局音频控制
    let currentLoop = null;          // 定时器ID
    let isPlaying = false;
    let audioContext = null;          // 用于合成声音
    let activeAudioElements = [];     // 存储真实音频元素

    // 停止所有正在播放的真实音频
    function stopAllRealAudio() {
        activeAudioElements.forEach(audio => {
            audio.pause();
            audio.currentTime = 0;
        });
        activeAudioElements = [];
    }

    // 停止循环
    function stopLoop() {
        if (currentLoop) {
            clearInterval(currentLoop);
            currentLoop = null;
        }
        isPlaying = false;
    }

    // 🎵 核心：根据选项播放真实音频文件
    function playMusicBySelection() {
        // 停止之前的播放
        stopLoop();
        stopAllRealAudio();

        if (!selectedKick && !selectedmelody) {
            alert("Please select at least one instrument！");
            return false;
        }

        // 计算节拍间隔 (毫秒)
        const intervalMs = (60 / currentBPM) ;
        
        // 音频文件路径
        const audioFiles = {
            // 底鼓样式
            kick1: 'audio/kick_1.mp3',     
            kick2: 'audio/kick_2.mp3', 
            kick3: 'audio/kick_3.mp3',       
            // 吉他旋律
            guitar1: 'audio/guitar_1.mp3', 
            guitar2: 'audio/guitar_2.mp3', 
            // 钢琴旋律
            piano1: 'audio/piano_1.mp3',   
            piano2: 'audio/piano_2.mp3'   
        };

        // 获取用户选择的文件
        const kickFile = audioFiles[selectedKick];
        const melodyFile = audioFiles[selectedmelody]

        // 检查文件是否存在
        console.log(`willperform: bassdrum=${kickFile}, guitar=${melodyFile}, piano=${melodyFile}`);

        // 用于记录当前播放到第几拍
        let beatCount = 0;
        const totalBeats = 64; // 一共播放64拍

        // 播放函数：同时播放三个乐器
        const playBeat = () => {
            if (beatCount >= totalBeats) {
                // 播放完毕，停止循环
                stopLoop();
                document.getElementById('playingMsg').innerHTML = '🎉 Perfect! Click "Refresh" to reselect. 🎉';
                return;
            }

            // 创建并播放底鼓
            const kickAudio = new Audio(kickFile);
            kickAudio.volume = 0.5;
            kickAudio.play().catch(e => console.warn("drum_fail:", e));
            activeAudioElements.push(kickAudio);

            // 创建并播放吉他或钢琴
            const melodyAudio = new Audio(melodyFile);
            melodyAudio.volume = 0.5;
            melodyAudio.play().catch(e => console.warn("melody_fail:", e));
            activeAudioElements.push(melodyAudio);

            // 每播放完一拍，清理一下已结束的音频引用
            setTimeout(() => {
                activeAudioElements = activeAudioElements.filter(a => !a.ended);
            }, intervalMs);

            beatCount++;
        };

        // 立即播放第一拍
        playBeat();
        // 设置循环
        currentLoop = setInterval(playBeat, intervalMs);
        isPlaying = true;
        
        // 更新显示文本
        document.getElementById('playingMsg').innerHTML = `🎵 performing · BPM ${currentBPM} · ${getKickName()} · ${getGuitarName()} · ${getPianoName()} 🎵`;
        return true;
    }

    // 辅助函数：获取中文名称（用于显示）
    function getKickName() {
        if(selectedKick === 'kick1') return 'bass drum 1';
        if(selectedKick === 'kick2') return 'bass drum 2';
        if(selectedKick === 'kick3') return 'bass drum 3';
        return 'non bass drum';
    }
    function getMelodyName() {
        if(selectedmelody=== 'guitar1') return 'guitar 1';
        if(selectedmelody === 'guitar2') return 'guitar 2';
        if(selectedmelody === 'piano1') return 'piano 1';
        if(selectedmelody=== 'piano2') return 'piano 2';
        return 'non melody'
    }

    //界面交互
    startBtn.addEventListener('click', () => {
        artTextDiv.style.display = 'none';
        startBtn.style.display = 'none';
        optionsPanel.style.display = 'flex';
    });

    bpmSlider.addEventListener('input', (e) => {
        currentBPM = e.target.value;
        bpmValueSpan.innerText = currentBPM + ' BPM';
    });

    // 底鼓选择
    kickBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            kickBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedKick = btn.getAttribute('data-kick');
        });
    });
    // melody选择
    melodyBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            melodyBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedmelody = btn.getAttribute('data-melody');
        });
    });
   

    // 完成按钮
    completeBtn.addEventListener('click', () => {
        if (!selectedKick && !selectedmelody) {
            alert("Please complete at least one of the following choices: Bass drum, Guitar or Piano!");
            return;
        }
        // 隐藏选项面板，显示演奏区
        optionsPanel.style.display = 'none';
        performanceArea.style.display = 'flex';
        // 开始播放音乐
        playMusicBySelection();
    });
</script>
</body>
</html>
