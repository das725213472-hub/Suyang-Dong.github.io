<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Das's Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, lab(87.91% 23.2 -11.61), hwb(315 41% 2%));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.067);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 40px 30px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        .art-text {
            font-family: Comic Sans MS;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, lab(77.78% -27.3 -20.4), hsl(6, 84%, 55%));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }

        #buttonstart {
            display: block;
            margin: 20px auto 0;
            padding: 14px 32px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(95deg, lch(55.46% 84.68 38.01), hwb(320 49% 6%));
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        #buttonstart:hover {
            opacity: 0.9;
        }

        .options-panel {
            display: none;
            flex-direction: column;
            gap: 28px;
        }

        .option-group {
            background: rgba(16, 3, 10, 0.536);
            border-radius: 32px;
            padding: 18px 22px;
            border-left: 5px solid lab(62.92% 55.47 -51.06 / 0.706);
        }

        .group-title {
            font-size: 20px;
            font-weight: bold;
            color: hwb(249 41% 5%);
            margin-bottom: 15px;
        }

        .speed-area {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        input[type="range"] {
            flex: 2;
            height: 5px;
            border-radius: 10px;
            min-width: 150px;
        }

        .speed-value {
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .music-option {
            background: #252539;
            border: 1px solid #5a5a8a;
            padding: 8px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .music-option:hover {
            border-color: #f5af19;
        }
        .music-option.selected {
            background: hwb(167 14% 0%);
            color: #1e1e2a;
            border-color: #f5af19;
        }

        #completeBtn {
            background: hsl(332, 100%, 70%);
            border: none;
            padding: 14px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s ease;
        }
        #completeBtn:hover {
            opacity: 0.9;
        }

        .performance-area {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            text-align: center;
        }

        .drummer-gif {
            width: 200px;
            height: 200px;
            background: lch(0.58% 2.77 19.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            animation: bob 0.6s infinite alternate;
        }

        @keyframes bob {
            0% { transform: translateY(0px); }
            100% { transform: translateY(10px); }
        }

        .playing-text {
            color: white;
            background: #00000066;
            padding: 8px 18px;
            border-radius: 40px;
            line-height: 1.6;
        }

        #resetBtn {
            margin-top: 15px;
            padding: 12px 28px;
            font-size: 18px;
            border-radius: 60px;
            border: none;
            background: #444654;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #resetBtn:hover {
            opacity: 0.9;
        }
        #eastereggBtn {
            margin-top: 10px;
            padding: 6px 14px;
            font-size: 18px;
            border-radius: 30px;
            border: none;
            background:lch(83.93% 22.55 227.87);
            color:hsl(196, 74%, 81%);
            transition: opacity 0.2s;
        }
        #eastereggBtn:hover{
            opacity: 0.8;
        }
        #eastereggBtn2{
            margin-top:10px;
            padding: 6px 14px;
            font-size: 18px;
            border-radius: 30px;
            border: none;
            background:lch(83.93% 22.55 227.87);
            color:hsl(196, 74%, 81%);
            transition: opacity 0.2s;
            display: none;
        }
        #eastereggBtn2:hover{
            opacity: 0.8;
        }
        #fxky{
            font-size: 25px;
            color:lch(87.6% 32.9 211.36);
            display:none;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="art-text" id="artTitle">The Das's Studio</div>
    <button id="buttonstart">🎧 start playing 🎧</button>

    <div id="optionsPanel" class="options-panel">
        <div class="option-group">
            <div class="group-title">⚡BPM[just for display,sorry]</div>
            <div class="speed-area">
                <input type="range" id="bpmSlider" min="60" max="180" value="110" step="1">
                <span class="speed-value" id="bpmValue">110 BPM</span>
            </div>
        </div>

        <div class="option-group">
            <div class="group-title">🥁 Bass drum (Choose one out of three options)</div>
            <div class="btn-group" id="kickGroup">
                <button data-kick="kick1" class="music-option">🎵 Bass drum · 1</button>
                <button data-kick="kick2" class="music-option">🎵 Bass drum · 2</button>
                <button data-kick="kick3" class="music-option">🎵 Bass drum · 3</button>
            </div>
        </div>

        <div class="option-group">
            <div class="group-title">🎸 guitar and 🎹 piano melody (Choose one out of four options)</div>
            <div class="btn-group" id="melodyGroup">
                <button data-melody="guitar1" class="music-option">🎸 guitar · 1</button>
                <button data-melody="guitar2" class="music-option">🎸 guitar · 2</button>
                <button data-melody="piano1" class="music-option">🎹 piano · 1</button>
                <button data-melody="piano2" class="music-option">🎹 piano · 2</button>
            </div>
        </div>

        <button id="completeBtn">✨ Finished ✨</button>
    </div>

    <div id="performanceArea" class="performance-area">
        <div class="drummer-gif">🥁🎶</div>
        <div class="playing-text" id="playingMsg">🎵 Your band is performing 🎵</div>
        <button id="resetBtn">🔄 Re-select</button>
        <button id="eastereggBtn">👻👨‍🦳</button>
        <button id="eastereggBtn2">🤡🤕</button>
        <p id="fxky">FXKEX</p>
    </div>
</div>

<script>
    // 全局状态
    let selectedKick = null;
    let selectedMelody = null;
    let currentBPM = 110;
    let isPlaying = false;

    // DOM
    const artTitle = document.getElementById('artTitle');
    const startBtn = document.getElementById('buttonstart');
    const optionsPanel = document.getElementById('optionsPanel');
    const performanceArea = document.getElementById('performanceArea');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmValueSpan = document.getElementById('bpmValue');
    const completeBtn = document.getElementById('completeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const playingMsg = document.getElementById('playingMsg');
    const eastereggBtn = document.getElementById('eastereggBtn');
    const eastereggBtn2 = document.getElementById('eastereggBtn2');
    const fxky = document.getElementById('fxky')

    const kickBtns = document.querySelectorAll('#kickGroup .music-option');
    const melodyBtns = document.querySelectorAll('#melodyGroup .music-option');

    // 预加载所有音频，开启原生循环
    const audioSources = {
        kick1: new Audio('audio/kick_1.mp3'),
        kick2: new Audio('audio/kick_2.mp3'),
        kick3: new Audio('audio/kick_3.mp3'),
        guitar1: new Audio('audio/guitar_1.mp3'),
        guitar2: new Audio('audio/guitar_2.mp3'),
        piano1: new Audio('audio/piano_1.mp3'),
        piano2: new Audio('audio/piano_2.mp3'),
        Easteregg1 : new Audio('audio/dwkm.mp3'),
        Easteregg2 : new Audio('audio/IDGAF.mp3')
    };

    // 统一配置
    Object.values(audioSources).forEach(audio => {
        audio.volume = 0.6;
        audio.loop = false;
    });

    // 停止所有音频
    function stopAllAudio() {
        isPlaying = false;
        Object.values(audioSources).forEach(audio => {
            audio.pause();
            audio.currentTime = 0;
        });
    }

    // 乐器名称
    function getKickName() {
        const map = { kick1: 'Bass drum 1', kick2: 'Bass drum 2', kick3: 'Bass drum 3' };
        return map[selectedKick];
    }
    function getMelodyName() {
        const map = { guitar1: 'Guitar 1', guitar2: 'Guitar 2', piano1: 'Piano 1', piano2: 'Piano 2' };
        return map[selectedMelody];
    }

    // 开始播放
    function playMusic() {
        if (isPlaying) return;
        stopAllAudio();
        isPlaying = true;

        if (selectedKick) {
        const kickAudio = audioSources[selectedKick];
        kickAudio.currentTime = 0;
        kickAudio.play().catch(e => console.warn('Kick play failed:', e));
    }
    
        if (selectedMelody) {
        const melodyAudio = audioSources[selectedMelody];
        melodyAudio.currentTime = 0;
        melodyAudio.play().catch(e => console.warn('Melody play failed:', e));
    }

        playingMsg.innerHTML = `🎵 Performing · BPM ${currentBPM}<br>${getKickName()} · ${getMelodyName()}`;
    }

    // 重置页面
    function resetPage() {
        stopAllAudio();
        performanceArea.style.display = 'none';
        optionsPanel.style.display = 'flex';
        playingMsg.innerHTML = '🎵 Your band is performing 🎵';
    }

  
    const ebtn = eastereggBtn
    const eaudio = audioSources.Easteregg1;
        ebtn.addEventListener('click', function() {
        stopAllAudio();
        eaudio.currentTime = 0;
        eaudio.play().catch(function(e) {});
    });
        
    const ebtn2 = eastereggBtn2
    const eaudio2 = audioSources.Easteregg2;
        ebtn2.addEventListener('click', function() {
        stopAllAudio();
        eaudio2.currentTime = 0;
        eaudio2.play().catch(function(e) {});
    });

    // 事件绑定
    startBtn.addEventListener('click', () => {
        artTitle.style.display = 'none';
        startBtn.style.display = 'none';
        optionsPanel.style.display = 'flex';
    });

    bpmSlider.addEventListener('input', (e) => {
        currentBPM = +e.target.value;   
        bpmValueSpan.textContent = `${currentBPM} BPM`;
    });

    kickBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            kickBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedKick = btn.dataset.kick;
        });
    });

    melodyBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            melodyBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedMelody = btn.dataset.melody;
        });
    });

    completeBtn.addEventListener('click', () => {
        optionsPanel.style.display = 'none';
        performanceArea.style.display = 'flex';
        playMusic();
    });

    resetBtn.addEventListener('click', resetPage);

    eastereggBtn.addEventListener('click', ( ) => {
        eastereggBtn.style.display = 'none';
        eastereggBtn2.style.display = 'flex';
    })
    eastereggBtn2.addEventListener('click', ( ) => {
        eastereggBtn2.style.display = 'none';
        fxky.style.display = 'flex'
    })
</script>
</body>
</html>
